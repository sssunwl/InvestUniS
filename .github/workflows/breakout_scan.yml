name: Daily Breakout Scanner

# 網站「動能」Tab 建議的最佳掃描時間是美股開盤後 30-60 分鐘（HKT 22:30-23:30）。
# 但這個時段落在 UTC 白天（14:30-15:30 UTC），過去 send_tg.yml 在同一時段就出現過
# GitHub Actions 免費 tier cron queue 延遲 2-4 小時的問題，這裡大機率也會延遲——
# 在遷移到 Oracle VM（見 PROJECT_STATUS.md 下一步）之前，這個排程只能算「盡量準時」，
# 不是保證準時。想要準時可以在 GitHub Actions 頁面手動 workflow_dispatch。
on:
  schedule:
    - cron: '45 14 * * 1-5'  # 約 22:45 HKT，開盤後30分鐘左右（實際到達時間受queue影響）
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Run breakout scanner
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISCORD_WEBHOOK_INVESTUNIS: ${{ secrets.DISCORD_WEBHOOK_INVESTUNIS }}
        run: python scripts/breakout_scanner.py
