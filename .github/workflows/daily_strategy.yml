name: Daily Options Strategy → Discord

on:
  schedule:
    # 13:45 UTC = 21:45 HKT — 美股開盤（09:30 ET）後 15 分，0DTE 履約價與權利金有即時報價
    - cron: '45 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      # ── QQQ（指數，沿用 market_state.json，index.html 事實卡也讀它） ──
      - name: Fetch fresh market state (QQQ)
        run: python scripts/fetch_market_state.py

      - name: Build strategy & push to Discord (QQQ)
        env:
          DISCORD_WEBHOOK_INVESTUNIS: ${{ secrets.DISCORD_WEBHOOK_INVESTUNIS }}
        run: python scripts/daily_strategy.py

      # ── MU（單一個股，含財報避讓；參數在 data/options_watchlist.json） ──
      # continue-on-error：MU 抓失敗不拖垮 QQQ 那則已發出的推播。
      - name: Fetch fresh market state (MU)
        continue-on-error: true
        run: python scripts/fetch_market_state.py MU

      - name: Build strategy & push to Discord (MU)
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_INVESTUNIS: ${{ secrets.DISCORD_WEBHOOK_INVESTUNIS }}
        run: python scripts/daily_strategy.py MU
