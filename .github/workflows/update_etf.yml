name: Update ETF Data

on:
  schedule:
    # 05:00 UTC = 13:00 HKT — midday, before US market open
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch ETF data
        run: python scripts/fetch_etf_data.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_data.json
          git diff --staged --quiet || git commit -m "chore: etf data update"
          git push
