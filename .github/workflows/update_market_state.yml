name: Update Market State

on:
  schedule:
    # 需要美股盤中才有 ATM Straddle 報價。09:30 ET 開盤 = 13:30 UTC（夏令）。
    # 13:45 UTC — 開盤後 15 分（0DTE 預期波幅）
    - cron: '45 13 * * 1-5'
    # 17:00 UTC — 美東午盤，更新一次
    - cron: '0 17 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch market state
        run: python scripts/fetch_market_state.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_state.json
          git diff --staged --quiet || git commit -m "chore: market state update"
          git push
